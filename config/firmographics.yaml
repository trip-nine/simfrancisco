# firmographics.yaml — the "PUMS" of simsoc.
#
# simfrancisco sampled real Census person microdata and carried PWGTP weights.
# There is no public joint microdata file of US firms x security orgs, so simsoc
# does the next best thing: stratified sampling from documented marginal priors,
# with every persona carrying a firm_weight = (firms represented by its tier) /
# (personas sampled in its tier). All aggregates are weight-post-stratified.
#
# Firm counts are order-of-magnitude approximations of US Census SUSB employer-firm
# distributions (see NOTES in README). They are EDITABLE PRIORS, not ground truth —
# recalibrate against your own TAM / customer-base data before trusting cuts by tier.

tiers:
  t1_f500:
    label: "Fortune 500 / global enterprise (10,000+ employees)"
    us_firms: 2000
    employees: [10000, 250000]      # log-uniform sample range
    endpoints_per_employee: 1.45    # workstations + servers + cloud workloads
    security_team: [40, 600]
    default_quota: 40
  t2_large:
    label: "Large enterprise (2,500-9,999 employees)"
    us_firms: 8000
    employees: [2500, 9999]
    endpoints_per_employee: 1.35
    security_team: [12, 60]
    default_quota: 36
  t3_upper_mid:
    label: "Upper midmarket (1,000-2,499 employees)"
    us_firms: 10000
    employees: [1000, 2499]
    endpoints_per_employee: 1.30
    security_team: [4, 15]
    default_quota: 36
  t4_mid:
    label: "Midmarket (250-999 employees)"
    us_firms: 42000
    employees: [250, 999]
    endpoints_per_employee: 1.25
    security_team: [1, 5]
    default_quota: 44
  t5_smb:
    label: "SMB (50-249 employees)"
    us_firms: 240000
    employees: [50, 249]
    endpoints_per_employee: 1.20
    security_team: [0, 2]
    default_quota: 48
  t6_small:
    label: "Small business (10-49 employees)"
    us_firms: 1100000
    employees: [10, 49]
    endpoints_per_employee: 1.15
    security_team: [0, 1]
    default_quota: 36


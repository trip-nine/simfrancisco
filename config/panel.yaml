# panel.yaml — default panel + run settings.

panel:
  seed: 42
  # Quota-stratified sample (oversamples large firms; firm_weights restore
  # representativeness at aggregation time). Override per tier or via --n scale.
  quotas:
    t1_f500: 40
    t2_large: 36
    t3_upper_mid: 36
    t4_mid: 44
    t5_smb: 48
    t6_small: 36

run:
  as_of_date: "2026-07-21"
  weight_mode: seats            # seats | firms  (seats ~ protected-endpoint share; firms ~ one-company-one-vote)
  mode: archetype               # archetype (batched, cheap) | persona (per-respondent, richer verbatims)
  engine: anthropic             # anthropic | prior  (prior = stance-vector heuristic, no API, offline baseline)
  model: claude-sonnet-4-6
  max_tokens: 1400
  temperature: 0.7
  pressures_per_persona: 2
  max_archetypes: 48
  concurrency: 4
  cache_db: runs/cache.db       # sha256(model|system|user|max_tokens) -> response; clean-mode reproducibility
